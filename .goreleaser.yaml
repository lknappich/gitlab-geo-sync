version: 2

project_name: gitlab-geo-sync

before:
  hooks:
    - go mod tidy

builds:
  - id: geoctl
    main: ./cmd/geoctl
    binary: geoctl
    ldflags:
      - -s -w
      - -X github.com/lknappich/gitlab-geo-sync/internal/version.Version={{.Version}}
      - -X github.com/lknappich/gitlab-geo-sync/internal/version.Commit={{.ShortCommit}}
      - -X github.com/lknappich/gitlab-geo-sync/internal/version.BuildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids: [geoctl]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - deploy/config.example.yaml

dockers_v2:
  - images:
      - ghcr.io/lknappich/gitlab-geo-sync
    tags:
      - "{{ .Version }}"
      - latest
    labels:
      org.opencontainers.image.description: "Independent orchestrator that mirrors a self-hosted GitLab to one or more replicas using standard tooling."
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.name: "{{.ProjectName}}"
      org.opencontainers.image.revision: "{{.FullCommit}}"
      org.opencontainers.image.version: "{{.Version}}"
      org.opencontainers.image.source: "{{.GitURL}}"
      org.opencontainers.image.licenses: Apache-2.0
    platforms:
      - linux/amd64
      - linux/arm64

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: lknappich
    name: gitlab-geo-sync
  draft: true
  prerelease: auto

sboms:
  - id: default
    artifacts: archive