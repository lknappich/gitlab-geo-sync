version: 2

project_name: gitlab-geo-sync

before:
  hooks:
    - go mod tidy

builds:
  - id: geoctl
    main: ./cmd/geoctl
    binary: geoctl
    ldflags:
      - -s -w
      - -X github.com/lknappich/gitlab-geo-sync/internal/version.Version={{.Version}}
      - -X github.com/lknappich/gitlab-geo-sync/internal/version.Commit={{.ShortCommit}}
      - -X github.com/lknappich/gitlab-geo-sync/internal/version.BuildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    builds: [geoctl]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - deploy/config.example.yaml

dockers:
  - id: geoctl
    goos: linux
    goarch: amd64
    ids: [geoctl]
    image_templates:
      - "ghcr.io/lknappich/gitlab-geo-sync:{{ .Version }}"
      - "ghcr.io/lknappich/gitlab-geo-sync:latest"
    dockerfile: Dockerfile
    use: buildx

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: lknappich
    name: gitlab-geo-sync
  draft: true
  prerelease: auto

sboms:
  - id: default
    artifacts: archive