# gitlab-geo-sync example configuration.
#
# All secret values MUST be supplied via environment variables using the
# dollar-brace-VAR placeholder syntax. Literal secrets in this file are
# rejected. Before running geoctl, export the referenced variables, e.g.:
#
#   export PG_CTRL_PASSWORD=...
#   export PG_REPL_PASSWORD=...
#   export SEC_REPL_PASSWORD=...
#   export S3_AK=...
#   export S3_SK=...

primary:
  name: primary-eu
  external_url: https://gitlab.primary.example.com
  postgres:
    host: 10.0.0.10
    port: 5432
    db: gitlabhq_production
    user: gitlab
    password: ${PG_CTRL_PASSWORD}
    replication_user: gitlab_repl
    replication_password: ${PG_REPL_PASSWORD}
    slot_name: gitlab_geo_sync
    # TLS: defaults to 'require' (never cleartext). Set to 'disable' only
    # for local dev (a warning is logged). Other valid values:
    # allow, prefer, verify-ca, verify-full.
    sslmode: require
    # For verify-ca / verify-full, point to the CA cert:
    # ssl_root_cert: /etc/ssl/certs/pg-ca.pem
    # For mutual TLS:
    # ssl_cert: /etc/ssl/client-cert.pem
    # ssl_key: /etc/ssl/client-key.pem
  git:
    # "rsync": filesystem copy of repos_path (requires SSHHost).
    # "fetch": per-project git fetch via Gitaly/SSH (no FS access needed).
    mode: rsync
    repos_path: /var/opt/gitlab/git-data/repositories
    hashed_storage: true
  object_storage:
    backend: s3
    s3:
      region: eu-west-1
      primary_bucket: gitlab-primary
      replica_bucket: gitlab-replica
      access_key: ${S3_AK}
      secret_key: ${S3_SK}
      # Optional for MinIO:
      # endpoint: http://minio:9000
      replication_lag: 30s
  ssh_host: primary.example.com:22

secondaries:
  - name: secondary-us
    external_url: https://gitlab.secondary.example.com
    postgres:
      host: 10.1.0.10
      port: 5432
      db: gitlabhq_production
      user: gitlab
      password: ${PG_CTRL_PASSWORD}
      replication_user: gitlab_repl
      replication_password: ${SEC_REPL_PASSWORD}
      sslmode: require
    git:
      mode: rsync
      repos_path: /var/opt/gitlab/git-data/repositories
      hashed_storage: true
    object_storage:
      backend: s3
      s3:
        region: us-east-1
        primary_bucket: gitlab-primary
        replica_bucket: gitlab-replica
        access_key: ${S3_AK}
        secret_key: ${S3_SK}
    registry:
      mode: s3
      s3:
        region: us-east-1
        primary_bucket: gitlab-registry-primary
        replica_bucket: gitlab-registry-replica
        access_key: ${S3_AK}
        secret_key: ${S3_SK}
    ssh_host: secondary.example.com:22

sync:
  sweep_interval: 5m
  lag_warning_threshold: 30s
  lag_critical_threshold: 5m
  failover_enabled: false
  read_only_secondary: false
  consistency_sample_pct: 0.01

metrics:
  addr: ":9101"

log:
  level: info
  format: json

control_db: sqlite://data/geoctl.db

# Optional: webhook receiver for immediate per-project sync on push/create/delete.
# webhook:
#   addr: ":9102"
#   secret_token: WEBHOOK_SECRET_PLACEHOLDER

# Optional: API-driven observational validator (read-only, never writes).
# api_validator:
#   enabled: true
#   primary_token: PRIMARY_API_TOKEN_PLACEHOLDER
#   secondary_token: SECONDARY_API_TOKEN_PLACEHOLDER

# Optional: failover controller.
# failover:
#   health_check_urls:
#     - https://gitlab.primary.example.com/-/health
#   health_check_interval: 10s
#   quorum_required: 1
#   dns_plugin: none  # route53 | cloudflare | none
#   dns_config:
#     zone_id: "Z123EXAMPLE"
#     record_name: "gitlab.primary.example.com"
#   auto_failover: false  # DANGEROUS: if true, fails over without human gate